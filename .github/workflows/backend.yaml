name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:latest

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:latest

      - name: Update Deployment Manifest
        working-directory: .
        run: |
          sed -i "s|image: .*citizenportal-desc-backend.*|image: ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-backend:${{ github.sha }}|" k8s/backend/deployment.yaml

      - name: Commit Manifest
        working-directory: .
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add k8s/backend/deployment.yaml
          git diff --cached --quiet || git commit -m "Update backend image to ${{ github.sha }}"

      - name: Push Manifest
        working-directory: .
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
