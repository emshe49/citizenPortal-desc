name: Frontend GitOps CI

on:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Dependencies
      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      # Build React App
      - name: Build React App
        working-directory: frontend
        run: npm run build

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        working-directory: frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-frontend:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-frontend:latest .

      # Push SHA Image
      - name: Push SHA Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-frontend:${{ github.sha }}

      # Push Latest Image
      - name: Push Latest Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-frontend:latest

      # Update Kubernetes Deployment Manifest
      - name: Update Frontend Deployment Manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/citizenportal-desc-frontend:${{ github.sha }}|g" k8s/frontend/deployment.yaml

      # Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # Commit Updated Manifest
      - name: Commit Manifest
        run: |
          git add k8s/frontend/deployment.yaml
          git commit -m "Update frontend image to ${{ github.sha }}" || echo "No changes to commit"

      # Push Changes
      - name: Push Manifest
        run: |
          git push
